# playbooks/06-ssl.yml
---
- name: "Generate SSL Certificate"
  hosts: gateway_servers
  become: true
  gather_facts: true

  vars_files:
    - "../group_vars/all.yml"

  vars:
    deploy_user: deployer
    nginx_dir: "/home/deployer/nginx"
    network_name: "eep_network"
    vm_app_ip: "{{ hostvars['vm-app']['ansible_host'] }}"
    frontend_port: 3000
    ssl_provider: "letsencrypt"       # letsencrypt atau selfsigned

  roles:
    - ssl

  post_tasks:
    - name: Final check nginx dengan SSL
      shell: docker ps --filter "name=nginx-gateway" --format "table {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}\t{{ '{{' }}.Ports{{ '}}' }}"
      register: docker_ps
      changed_when: false

    - name: Print nginx status
      debug:
        msg: "{{ docker_ps.stdout_lines }}"

    - name: Show akses URLs
      debug:
        msg:
          - "Frontend  : https://{{ app_domain }}"
          - "Grafana   : https://grafana.{{ app_domain }}"
          - "Prometheus: https://prometheus.{{ app_domain }}"