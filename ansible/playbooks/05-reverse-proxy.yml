# playbooks/05-reverse-proxy.yml
---
- name: "Setup Nginx Reverse Proxy on Gateway"
  hosts: gateway_servers
  become: true
  gather_facts: true

  vars_files:
    - "../group_vars/all.yml"

  vars:
    deploy_user: deployer
    nginx_dir: "/home/deployer/nginx"
    network_name: "eep_network"
    vm_app_ip: "{{ hostvars['vm-app']['ansible_host'] }}"
    frontend_port: 3000
    backend_port: 5000
    prometheus_port: 9090
    grafana_port: 3001

  pre_tasks:
    - name: Ensure Docker network exists
      community.docker.docker_network:
        name: "{{ network_name }}"
        state: present

  roles:
    - nginx

  post_tasks:
    - name: Final check - nginx running
      shell: docker ps --filter "name=nginx-gateway" --format "table {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}\t{{ '{{' }}.Ports{{ '}}' }}"
      register: docker_ps
      changed_when: false

    - name: Print nginx info
      debug:
        msg: "{{ docker_ps.stdout_lines }}"