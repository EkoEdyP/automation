[defaults]

# Inventory default yang dipakai saat ansible-playbook dijalankan tanpa flag -i
# Hanya mengarah ke staging — untuk production harus override manual: -i inventories/production/hosts.yml
inventory = inventories/staging/hosts.yml

# Lokasi folder roles custom milik project ini
# '.' artinya relatif ke direktori tempat ansible.cfg berada
roles_path = ./roles

# Lokasi folder collections (ansible-galaxy collection install -p collections)
# Pastikan folder 'collections/' benar-benar ada, kalau tidak bisa dihapus
collections_paths = collections

# Menonaktifkan pengecekan SSH host key
# Aman untuk staging/lab, tapi sebaiknya diaktifkan (True) di production
host_key_checking = False

# Menonaktifkan pembuatan file .retry saat playbook gagal
# Direkomendasikan False agar tidak ada file sampah di direktori project
retry_files_enabled = False

# Format tampilan output di terminal
# 'default' adalah nilai bawaan Ansible — baris ini sebenarnya bisa dihapus
# Alternatif yang lebih readable: yaml, dense, unixy
stdout_callback = default

# Format hasil task ditampilkan dalam YAML, lebih mudah dibaca daripada JSON
result_format = yaml

# 'smart' = facts hanya dikumpulkan sekali per host per sesi, lalu di-cache
# Lebih efisien daripada 'implicit' (selalu gather) atau 'explicit' (tidak pernah gather)
gathering = smart

# Menyimpan cache facts ke file JSON di disk
# Bekerja bersama 'gathering = smart' — host yang sudah di-cache tidak akan di-gather ulang
fact_caching = jsonfile

# Lokasi folder penyimpanan cache facts
# /tmp bisa terhapus otomatis saat reboot — pertimbangkan path permanen seperti ~/.ansible/facts
fact_caching_connection = /tmp/ansible_facts

# Durasi cache facts sebelum dianggap kedaluwarsa (dalam detik)
# 86400 = 24 jam — artinya facts host tidak akan di-refresh selama 24 jam
fact_caching_timeout = 86400


[privilege_escalation]

# Mengaktifkan privilege escalation secara global untuk semua task & playbook
# Hati-hati: ini berlaku ke SEMUA playbook, termasuk yang tidak butuh jadi root
# Lebih aman jika di-set di level playbook saja (become: true di file .yml)
become = True

# Method escalation yang dipakai — sudo adalah standar umum di Linux
become_method = sudo

# User tujuan setelah escalation — root adalah nilai default Ansible
# Baris ini sebenarnya bisa dihapus karena 'root' sudah jadi default
become_user = root