# roles/monitoring/tasks/node_exporter.yml
---
- name: Create node_exporter user
  user:
    name: node_exporter
    system: yes
    shell: /bin/false
    create_home: no

- name: Check if node_exporter already installed
  stat:
    path: /usr/local/bin/node_exporter
  register: node_exporter_bin

- name: Download node_exporter
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz
  when: not node_exporter_bin.stat.exists

- name: Extract node_exporter
  unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp/
    remote_src: yes
  when: not node_exporter_bin.stat.exists

- name: Install node_exporter binary
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    owner: node_exporter
    group: node_exporter
    mode: "0755"
    remote_src: yes
  when: not node_exporter_bin.stat.exists

- name: Deploy node_exporter systemd service
  copy:
    dest: /etc/systemd/system/node_exporter.service
    content: |
      [Unit]
      Description=Node Exporter
      After=network.target

      [Service]
      User=node_exporter
      Group=node_exporter
      Type=simple
      ExecStart=/usr/local/bin/node_exporter --web.listen-address=:{{ node_exporter_port }}
      Restart=always
      RestartSec=3

      [Install]
      WantedBy=multi-user.target

- name: Enable and start node_exporter
  systemd:
    name: node_exporter
    daemon_reload: yes
    state: started
    enabled: yes

- name: Allow node_exporter port in UFW
  ufw:
    rule: allow
    port: "{{ node_exporter_port | string }}"
    proto: tcp